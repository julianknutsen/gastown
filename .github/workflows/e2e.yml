name: E2E Tests

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  e2e:
    name: E2E Tests (Container)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Build test container
        run: docker build -f Dockerfile.e2e -t gastown-test .

      - name: Run E2E tests
        run: docker run --rm gastown-test

  e2e-agent:
    name: E2E Agent Tests (Container)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Build agent test container
        run: docker build -f Dockerfile.e2e -t gastown-agent-test .

      - name: Run agent E2E tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          docker run --rm \
            -e OPENROUTER_API_KEY \
            -v /tmp/e2e-agent-sessions:/tmp/e2e-agent-sessions \
            gastown-agent-test \
            sh -c "/app/scripts/start-litellm.sh && go test -tags=e2e_agent -timeout=10m -v -count=1 -parallel 1 -run TestAgent ./internal/cmd/..."

      - name: Upload agent session logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-session-logs
          path: /tmp/e2e-agent-sessions/
          if-no-files-found: ignore
